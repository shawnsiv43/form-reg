<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Toggle</title>
    <script src="{{ url_for('static', filename='script2.js') }}" defer></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <form id="register" method="POST">
            <h1>Register</h1>
            <div class="form-group">
                <div class="form-element">
                    <label for="username">Username</label><br>
                    <input type="text" id="username" name="Username" value="{{user.username if user else ''}}" required><br>
                    <small></small>
                </div>
                <div class="form-element">
                    <label for="email">Email</label><br>
                    <input type="text" id="email" name="email" value="{{user.email if user else ''}}" required><br>
                    <small></small>
                </div>
                <div class="form-element">
                    <label for="age">Age</label><br>
                    <input type="number" id="age" name="age" value="{{user.age if user else ''}}">
                    <small></small>
                </div>
                <div class="form-element">
                    <label for="password">Password</label><br>
                    <input type="text" id="password" name="password" value="{{user.password if user else ''}}"><br>
                    <small></small>
                </div>
                <div class="form-element">
                    <label for="confirm-password">Confirm Password</label><br>
                    <input type="text" id="confirm-password" name="confirmpassword" value="{{user.confirmpassword if user else ''}}"><br>
                    <small></small>
                </div>
                <button id="submit-btn" type="submit">Save</button>
                <br>
        </form>
        <div id="endResult"></div>

    </div>
</body>
</html>
